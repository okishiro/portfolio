<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
            position: relative;
        }

        .section {
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: flex 0.8s cubic-bezier(0.76, 0, 0.24, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .section:hover:not(.active)::before {
            opacity: 1;
        }

        .divider {
            display: none;
        }

        .section.inactive {
            flex: 1;
        }

        .section.active {
            flex: 6;
        }

        .section-inner {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.76, 0, 0.24, 1);
        }

        .section-title {
            font-size: 5vw;
            font-weight: 700;
            letter-spacing: -0.03em;
            text-transform: uppercase;
            transition: all 0.8s cubic-bezier(0.76, 0, 0.24, 1);
            position: relative;
            z-index: 2;
        }

        .section.inactive .section-title {
            font-size: 2rem;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
        }

        .section.active .section-title {
            position: absolute;
            top: 50px;
            left: 60px;
            font-size: 3.5rem;
            writing-mode: horizontal-tb;
            transform: none;
        }

        .section-content {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 180px 60px 60px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s cubic-bezier(0.76, 0, 0.24, 1) 0.2s;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .section.active .section-content {
            opacity: 1;
            visibility: visible;
        }

        .content-block {
            max-width: 800px;
            margin-bottom: 60px;
            animation: slideUp 0.8s cubic-bezier(0.76, 0, 0.24, 1) forwards;
            opacity: 0;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section.active .content-block {
            transform: translateY(30px);
        }

        .section.active .content-block:nth-child(1) { animation-delay: 0.3s; }
        .section.active .content-block:nth-child(2) { animation-delay: 0.4s; }
        .section.active .content-block:nth-child(3) { animation-delay: 0.5s; }
        .section.active .content-block:nth-child(4) { animation-delay: 0.6s; }
        .section.active .content-block:nth-child(5) { animation-delay: 0.7s; }

        .content-block h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .content-block p {
            font-size: 1.125rem;
            line-height: 1.7;
            color: #aaa;
            margin-bottom: 15px;
        }

        .project-item, .skill-item {
            padding: 30px 0;
            border-bottom: 1px solid #222;
            transition: all 0.3s ease;
        }

        .project-item:hover, .skill-item:hover {
            padding-left: 20px;
            border-bottom-color: #fff;
        }

        .project-item h3, .skill-item h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .project-item p, .skill-item p {
            color: #888;
            font-size: 1rem;
        }

        .tag {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            margin: 5px 5px 5px 0;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .tag:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.4);
        }

        #work { background: #000000; }
        #about { background: #0a0a0a; }
        #fun { background: #050505; }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            z-index: 1000;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' /%3E%3C/svg%3E");
        }

        /* Mobile styles */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .divider.vertical {
                display: none;
            }

            .divider.horizontal {
                display: block;
            }

            #divider1 {
                left: 0;
                top: 33.33%;
            }

            #divider2 {
                left: 0;
                top: 66.66%;
            }

            .section-title {
                font-size: 12vw;
            }

            .section.inactive .section-title {
                font-size: 2.5rem;
                writing-mode: horizontal-tb;
                transform: none;
            }

            .section.active .section-title {
                font-size: 2.5rem;
                top: 30px;
                left: 30px;
            }

            .section-content {
                padding: 120px 30px 40px;
            }

            .content-block h2 {
                font-size: 1.5rem;
            }

            .content-block p {
                font-size: 1rem;
            }

            .project-item h3 {
                font-size: 1.25rem;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .cursor-dot {
            display: none;
        }

        .cursor-outline {
            display: none;
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-outline" id="cursorOutline"></div>

    <div class="container" id="container">
        <div class="divider vertical" id="divider1-v"></div>
        <div class="divider vertical" id="divider2-v"></div>
        <div class="divider horizontal" id="divider1-h" style="display: none;"></div>
        <div class="divider horizontal" id="divider2-h" style="display: none;"></div>

        <div class="section inactive" id="work">
            <div class="section-inner">
                <h1 class="section-title">Work</h1>
                <div class="section-content">
                </div>
            </div>
        </div>

        <div class="section inactive" id="about">
            <div class="section-inner">
                <h1 class="section-title">About</h1>
                <div class="section-content">
                </div>
            </div>
        </div>

        <div class="section inactive" id="fun">
            <div class="section-inner">
                <h1 class="section-title">Fun</h1>
                <div class="section-content">
                    <div class="content-block">
                        <p style="font-size: 1.125rem; line-height: 2;">
                            <a href="https://www.youtube.com/watch?v=0-W6AQ0J1Zc" target="_blank" style="color: #aaa; text-decoration: none; transition: color 0.3s ease;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#aaa'">Shapeshifter</a><br>
                            <a href="https://www.youtube.com/watch?v=BKdigb7GasY" target="_blank" style="color: #aaa; text-decoration: none; transition: color 0.3s ease;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#aaa'">viscus</a><br>
                            <a href="https://youtu.be/Hg3G1E2tNCA" target="_blank" style="color: #aaa; text-decoration: none; transition: color 0.3s ease;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#aaa'">Television Rules the Nation / Crescendolls (Live 2007)</a><br>
                            <a href="https://youtu.be/dE3r8_FHGCw" target="_blank" style="color: #aaa; text-decoration: none; transition: color 0.3s ease;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#aaa'">BABIECA!</a><br>
                            <a href="https://youtu.be/kYukK73LOjo" target="_blank" style="color: #aaa; text-decoration: none; transition: color 0.3s ease;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#aaa'">Wide Open</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let activeSection = null;
        const cursorDot = document.getElementById('cursorDot');
        const cursorOutline = document.getElementById('cursorOutline');

        // Custom cursor - removed
        document.addEventListener('mousemove', (e) => {
            // Cursor functionality removed
        });

        document.querySelectorAll('.section').forEach(section => {
            section.addEventListener('mouseenter', () => {
                // Cursor functionality removed
            });
            section.addEventListener('mouseleave', () => {
                // Cursor functionality removed
            });
        });

        const sections = document.querySelectorAll('.section');
        
        sections.forEach(section => {
            section.addEventListener('click', function() {
                const sectionId = this.id;
                
                if (activeSection === sectionId) return;

                sections.forEach(s => {
                    if (s.id === sectionId) {
                        s.classList.remove('inactive');
                        s.classList.add('active');
                    } else {
                        s.classList.remove('active');
                        s.classList.add('inactive');
                    }
                });

                // Update divider positions
                const isMobile = window.innerWidth <= 768;
                if (!isMobile) {
                    if (sectionId === 'work') {
                        document.getElementById('divider1').style.left = '87.5%';
                        document.getElementById('divider2').style.left = '93.75%';
                    } else if (sectionId === 'about') {
                        document.getElementById('divider1').style.left = '12.5%';
                        document.getElementById('divider2').style.left = '87.5%';
                    } else {
                        document.getElementById('divider1').style.left = '12.5%';
                        document.getElementById('divider2').style.left = '25%';
                    }
                } else {
                    if (sectionId === 'work') {
                        document.querySelectorAll('#divider1')[1].style.top = '87.5%';
                        document.querySelectorAll('#divider2')[1].style.top = '93.75%';
                    } else if (sectionId === 'about') {
                        document.querySelectorAll('#divider1')[1].style.top = '12.5%';
                        document.querySelectorAll('#divider2')[1].style.top = '87.5%';
                    } else {
                        document.querySelectorAll('#divider1')[1].style.top = '12.5%';
                        document.querySelectorAll('#divider2')[1].style.top = '25%';
                    }
                }

                activeSection = sectionId;
            });
        });
    </script>
</body>
</html>
